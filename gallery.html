<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alleyoop Arts — The Collection</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='47' fill='%23EE9933'/%3E%3Cg stroke='%230E0E0E' stroke-width='4' fill='none' stroke-linecap='round'%3E%3Cline x1='50' y1='3' x2='50' y2='97'/%3E%3Cline x1='3' y1='50' x2='97' y2='50'/%3E%3Cpath d='M50 3 C22 26 22 74 50 97'/%3E%3Cpath d='M50 3 C78 26 78 74 50 97'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Sacramento&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#0E0E0E; --cream:#F2E9C7; --orange:#EE9933; --teal:#223333;
    --grotesque:'Hanken Grotesk', system-ui, sans-serif; --script:'Sacramento', cursive; }
  *{ box-sizing:border-box; }
  body{ margin:0; }
  .doc{ font-family:var(--grotesque); background:var(--bg); color:var(--fg); min-height:100vh;
    transition:background .35s ease, color .35s ease; }
  [data-mode="cream"]{ --bg:var(--cream); --fg:var(--ink);
    --fg-dim:color-mix(in srgb, var(--ink) 58%, var(--cream));
    --fg-faint:color-mix(in srgb, var(--ink) 36%, var(--cream));
    --hair:color-mix(in srgb, var(--ink) 16%, transparent);
    --surface:color-mix(in srgb, var(--cream) 88%, var(--ink)); --rim:var(--ink); }
  [data-mode="ink"]{ --bg:var(--ink); --fg:var(--cream);
    --fg-dim:color-mix(in srgb, var(--cream) 62%, var(--ink));
    --fg-faint:color-mix(in srgb, var(--cream) 38%, var(--ink));
    --hair:color-mix(in srgb, var(--cream) 18%, transparent);
    --surface:color-mix(in srgb, var(--ink) 88%, var(--cream)); --rim:var(--cream); }

  .wrap{ max-width:1340px; margin:0 auto; padding:0 clamp(20px,4vw,52px); }
  .mono-label{ font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--fg-faint); }

  /* wordmark engine (minimal) */
  .wm{ display:inline-flex; align-items:center; font-weight:800; letter-spacing:-.045em; line-height:1; white-space:nowrap; color:var(--fg); }
  .wm .ch{ display:inline-block; }
  .wm .oo{ position:relative; display:inline-flex; align-items:center; gap:.012em; margin:0 .006em; }
  .wm .rim{ display:inline-block; width:.78em; height:.78em; border-radius:50%; border:.118em solid var(--rim); box-sizing:border-box; transform:translateY(.012em); }
  .wm.twopart .rim.finish{ border-color:var(--orange); }
  .wm.oo-overlap .oo{ gap:0; }
  .wm.oo-overlap .rim.finish{ margin-left:-.32em; z-index:1; }
  .wm.oo-overlap .rim.pass{ z-index:3; }
  .wm.oo-overlap .oo-ball{ z-index:3; }
  .wm .arc{ position:absolute; left:-6%; top:-44%; width:112%; height:62%; overflow:visible; pointer-events:none; }
  .wm .arc path{ fill:none; stroke:var(--orange); }
  .wm .arc circle{ fill:var(--orange); }

  /* header */
  .ghead{ position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between;
    padding:16px clamp(20px,4vw,52px); background:color-mix(in srgb, var(--bg) 84%, transparent);
    backdrop-filter:blur(14px) saturate(150%); -webkit-backdrop-filter:blur(14px) saturate(150%);
    border-bottom:1px solid var(--hair); }
  .ghead nav{ display:flex; gap:26px; }
  .ghead nav a{ font-size:12.5px; font-weight:600; letter-spacing:.04em; color:var(--fg-dim); text-decoration:none; }
  .ghead nav a:hover{ color:var(--fg); }
  @media (max-width:860px){ .ghead nav{ display:none; } }
  .modeswitch{ display:inline-flex; padding:3px; border:1px solid var(--hair); border-radius:999px; }
  .modeswitch button{ appearance:none; border:0; background:transparent; cursor:pointer; font:inherit;
    font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--fg-faint);
    padding:7px 13px; border-radius:999px; transition:all .2s; }
  .modeswitch button[data-on="1"]{ background:var(--fg); color:var(--bg); }

  /* hero */
  .ghero{ padding:clamp(48px,8vw,96px) 0 clamp(28px,4vw,44px); border-bottom:1px solid var(--hair); }
  .ghero h1{ font-weight:800; letter-spacing:-.03em; line-height:.95; font-size:clamp(48px,10vw,128px); margin:14px 0 0; }

  /* filter chips */
  .chips{ display:flex; flex-wrap:wrap; gap:9px; padding:24px 0; position:sticky; top:61px; z-index:30;
    background:color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter:blur(8px); }
  .chip{ appearance:none; cursor:pointer; font:inherit; font-size:12.5px; font-weight:600; letter-spacing:.01em;
    padding:9px 17px; border-radius:999px; border:1px solid var(--hair); background:transparent; color:var(--fg-dim); transition:all .18s; }
  .chip:hover{ color:var(--fg); border-color:var(--fg-faint); }
  .chip[data-on="1"]{ background:var(--fg); color:var(--bg); border-color:transparent; }

  /* gallery grid */
  .ggrid{ columns:3; column-gap:clamp(14px,2vw,26px); padding:8px 0 80px; }
  @media (max-width:980px){ .ggrid{ columns:2; } }
  @media (max-width:560px){ .ggrid{ columns:1; } }
  .gcard{ break-inside:avoid; margin-bottom:clamp(14px,2vw,26px); cursor:pointer; }
  .gcard .frameimg{ position:relative; overflow:hidden; background:var(--surface); border-radius:3px; }
  .gcard img{ display:block; width:100%; height:auto; transition:transform .5s cubic-bezier(.2,.7,.2,1), filter .4s; }
  .gcard:hover img{ transform:scale(1.035); }
  .gcard .ov{ position:absolute; inset:0; display:flex; align-items:flex-end; padding:16px;
    background:linear-gradient(180deg,transparent 50%, rgba(14,14,14,.72)); opacity:0; transition:opacity .3s; }
  .gcard:hover .ov{ opacity:1; }
  .gcard .ov span{ font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:#F2E9C7;
    border:1px solid rgba(242,233,199,.6); border-radius:999px; padding:7px 13px; }
  .gcap{ display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding:12px 2px 0; }
  .gcap .t{ font-weight:700; font-size:15.5px; letter-spacing:-.01em; }
  .gcap .s{ font-size:12px; color:var(--fg-dim); margin-top:3px; }
  .gcap .p{ font-weight:700; font-size:14px; white-space:nowrap; }

  /* lightbox */
  .lb{ position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    background:rgba(8,8,8,.92); backdrop-filter:blur(6px); padding:clamp(14px,3vw,44px); }
  .lb-inner{ display:grid; grid-template-columns:minmax(0,1.4fr) minmax(300px,.9fr); gap:clamp(20px,4vw,56px);
    max-width:1180px; width:100%; max-height:92vh; align-items:center; }
  @media (max-width:820px){ .lb-inner{ grid-template-columns:1fr; max-height:none; overflow:auto; } }
  .lb-img{ display:flex; align-items:center; justify-content:center; }
  .lb-img img{ max-width:100%; max-height:84vh; width:auto; height:auto; border-radius:3px;
    box-shadow:0 40px 90px rgba(0,0,0,.5); }
  @media (max-width:820px){ .lb-img img{ max-height:56vh; } }
  .lb-meta{ color:#F2E9C7; }
  .lb-field{ display:flex; justify-content:space-between; gap:18px; padding:9px 0; border-bottom:1px solid rgba(242,233,199,.14); font-size:13.5px; }
  .lb-field span:first-child{ color:rgba(242,233,199,.55); }
  .lb-field span:last-child{ font-weight:600; }
  .lb-close{ position:fixed; top:18px; right:20px; z-index:101; appearance:none; cursor:pointer;
    width:42px; height:42px; border-radius:50%; border:1px solid rgba(242,233,199,.3); background:rgba(0,0,0,.3);
    color:#F2E9C7; font-size:18px; }
  .lb-nav{ position:fixed; top:50%; transform:translateY(-50%); z-index:101; appearance:none; cursor:pointer;
    width:52px; height:52px; border-radius:50%; border:1px solid rgba(242,233,199,.25); background:rgba(0,0,0,.3);
    color:#F2E9C7; font-size:20px; display:grid; place-items:center; }
  .lb-prev{ left:16px; } .lb-next{ right:16px; }
  @media (max-width:820px){ .lb-nav{ top:auto; bottom:14px; transform:none; } .lb-prev{ left:30%; } .lb-next{ right:30%; } }
  .acquire{ display:inline-flex; align-items:center; gap:10px; margin-top:22px; cursor:pointer;
    background:var(--orange); color:#0E0E0E; font-weight:700; font-size:13.5px; letter-spacing:.02em;
    padding:14px 24px; border-radius:999px; border:0; }

  .seal{ display:inline-grid; place-items:center; width:46px; height:46px; border-radius:50%; border:1px solid currentColor; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="logo.jsx?v=11"></script>
<script type="text/babel" src="gallery.jsx?v=11"></script>
</body>
</html>
