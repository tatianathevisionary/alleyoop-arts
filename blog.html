<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Journal — Alleyoop Arts</title>
<meta name="description" content="Long-form on the people, quotes and routes that make basketball beautiful. The Assist Files and The Maze, from Alleyoop Arts." />
<link rel="icon" href="logo/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Sacramento&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css" />
<style>
  .ghero{ padding:clamp(48px,8vw,96px) 0 clamp(28px,4vw,44px); border-bottom:1px solid var(--hair); }
  .bloglist{ display:flex; flex-direction:column; }
  .blogrow{ display:grid; grid-template-columns:auto 1fr auto; gap:clamp(16px,3vw,40px); align-items:center;
    padding:clamp(24px,3.5vw,40px) 0; border-top:1px solid var(--hair); text-decoration:none; color:var(--fg); transition:padding-left .25s ease; }
  .blogrow:last-of-type{ border-bottom:1px solid var(--hair); }
  .blogrow:hover{ padding-left:10px; }
  .blognum{ font-size:13px; font-weight:700; letter-spacing:.1em; color:var(--orange); }
  .blogarrow{ font-size:22px; color:var(--fg-faint); transition:color .2s, transform .25s; }
  .blogrow:hover .blogarrow{ color:var(--orange); transform:translateX(4px); }
  @media (max-width:640px){ .blogrow{ grid-template-columns:1fr; gap:6px; } .blogarrow{ display:none; } .blognum{ margin-bottom:4px; } }

  .post-body{ font-size:clamp(16px,1.35vw,18.5px); line-height:1.72; color:var(--fg); }
  .post-body p{ margin:0 0 20px; }
  .post-body h2{ font-weight:800; letter-spacing:-.015em; font-size:clamp(22px,2.6vw,30px); margin:38px 0 14px; }
  .post-body h3{ font-weight:700; font-size:clamp(18px,2vw,22px); margin:30px 0 10px; }
  .post-body blockquote{ margin:24px 0; padding:6px 0 6px 22px; border-left:3px solid var(--orange);
    font-size:clamp(19px,2.2vw,24px); line-height:1.4; font-weight:600; letter-spacing:-.01em; color:var(--fg); }
  .post-body strong{ font-weight:700; }
  .post-body a{ color:var(--orange); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="logo.jsx?v=1"></script>
<script type="text/babel" src="blog.jsx?v=1"></script>
</body>
</html>
