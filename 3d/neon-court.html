<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLEYOOP — Neon Court (loop prototype)</title>
<style>
  /* Collection layer: Neon Night palette from ALLEYOOP_ARTS_STYLE_GUIDE.md —
     #251E4A midnight violet · #3A6DB0 electric blue · #E2726D neon coral · #0B0B14 near-black
     Ball/rim stay #EE9933 sunset orange — the core rule of the catalog. */
  html, body { margin: 0; height: 100%; background: #0B0B14; overflow: hidden; color: #F2E9C7; }
  .tag {
    position: fixed; left: 24px; bottom: 20px;
    font: 500 13px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
    color: #F2E9C7; letter-spacing: .12em; user-select: none;
  }
  .tag b { letter-spacing: .18em; }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="frame"><canvas id="scene"></canvas></div>
<div class="tag"><b>ALLEYOOP</b> · neon court · 10s loop · neon night palette</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { Line2 } from 'three/addons/lines/Line2.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
import { LineGeometry } from 'three/addons/lines/LineGeometry.js';
import { mountViewframe, fitFov } from './viewframe.js';
import { makeBasketball, makeNet, bankShotPoints, BALL_ORANGE } from './basketball.js';

// Neon Night (style guide) + the orange rule
const VIOLET = 0x251E4A, ELECTRIC = 0x3A6DB0, CORAL = 0xE2726D, NEARBLACK = 0x0B0B14, GLOW = 0xDE7B7F;
const LOOP_SECONDS = 10;
const TAU = Math.PI * 2;

// --- renderer / post -----------------------------------------------------------
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(NEARBLACK);
scene.fog = new THREE.Fog(NEARBLACK, 18, 44);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(1, 1), 1.25, 0.8, 0.2));

// --- bold, precise court lines (fat lines — real pixel width, not 1px hairlines) ----
const lineMats = [];
function boldLine(points, color, widthPx = 5) {
  const geo = new LineGeometry();
  geo.setPositions(points.flatMap(p => [p.x, p.y, p.z]));
  const mat = new LineMaterial({ color, linewidth: widthPx, transparent: true, opacity: 0.95 });
  lineMats.push(mat);
  const line = new Line2(geo, mat);
  line.computeLineDistances();
  return line;
}
function circlePoints(r, y, cx = 0, cz = 0, a0 = 0, a1 = TAU, n = 96, close = false) {
  const pts = [];
  for (let i = 0; i <= n; i++) {
    const a = a0 + (a1 - a0) * (i / n);
    pts.push(new THREE.Vector3(cx + Math.cos(a) * r, y, cz + Math.sin(a) * r));
  }
  if (close) pts.push(pts[0].clone());
  return pts;
}

// --- the court: midnight slab + the lines of a real half-court ----------------------
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshStandardMaterial({ color: 0x12102A, roughness: 0.4, metalness: 0.55 })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

const grid = new THREE.GridHelper(80, 80, 0x251E4A, 0x191536);
grid.position.y = 0.01;
scene.add(grid);

// half-court geometry, electric blue + coral, BOLD
scene.add(boldLine(circlePoints(1.8, 0.03, 0, 2.5), CORAL, 6));                                  // center circle
scene.add(boldLine(circlePoints(6.0, 0.03, 0, -6, Math.PI * 0.06, Math.PI * 0.94), ELECTRIC, 6)); // 3pt arc
scene.add(boldLine([                                                                              // the key
  new THREE.Vector3(-2.0, 0.03, -9), new THREE.Vector3(-2.0, 0.03, -3.4),
  new THREE.Vector3( 2.0, 0.03, -3.4), new THREE.Vector3( 2.0, 0.03, -9),
], ELECTRIC, 6));
scene.add(boldLine(circlePoints(2.0, 0.03, 0, -3.4, Math.PI, TAU), ELECTRIC, 6));                 // free-throw circle
scene.add(boldLine([new THREE.Vector3(-10, 0.03, 2.5), new THREE.Vector3(10, 0.03, 2.5)], CORAL, 6)); // half-court line
scene.add(boldLine([                                                                              // baseline
  new THREE.Vector3(-10, 0.03, -9), new THREE.Vector3(10, 0.03, -9),
], ELECTRIC, 6));

// --- the hoop: ORANGE rim (the rule), coral-glow backboard ---------------------------
const RIM = new THREE.Vector3(0, 3.05, -6);
const rim = new THREE.Mesh(
  new THREE.TorusGeometry(0.45, 0.05, 16, 80),
  new THREE.MeshStandardMaterial({ color: BALL_ORANGE, emissive: BALL_ORANGE, emissiveIntensity: 1.6, roughness: 0.4 })
);
rim.rotation.x = Math.PI / 2;
rim.position.copy(RIM);
scene.add(rim);

// net of light — cream strands with a glow kick so the bloom catches them
const net = makeNet(0.43, { color: 0xF2E9C7, emissiveIntensity: 0.7 });
net.position.copy(RIM);
scene.add(net);

const bb = new THREE.Group();
bb.add(boldLine([
  new THREE.Vector3(-1.0, 0, 0), new THREE.Vector3(1.0, 0, 0),
  new THREE.Vector3(1.0, 1.2, 0), new THREE.Vector3(-1.0, 1.2, 0),
  new THREE.Vector3(-1.0, 0, 0),
], CORAL, 5));
bb.add(boldLine([
  new THREE.Vector3(-0.32, 0.08, 0), new THREE.Vector3(0.32, 0.08, 0),
  new THREE.Vector3(0.32, 0.58, 0), new THREE.Vector3(-0.32, 0.58, 0),
  new THREE.Vector3(-0.32, 0.08, 0),
], CORAL, 5));
bb.position.set(0, 2.85, -6.55);
scene.add(bb);
scene.add(boldLine([new THREE.Vector3(0, 0, -7.1), new THREE.Vector3(0, 3.4, -7.1)], 0x3A6DB0, 4)); // pole

// --- the ball: a basketball. Orange, bold seams, slight glow for the dark ------------
const BALL_R = 0.38;
const ball = makeBasketball(BALL_R, { emissiveIntensity: 0.35, seamWidth: 0.06 });
scene.add(ball);

// mood lights — electric blue & coral wash the slab; warm light at the rim
const l1 = new THREE.PointLight(CORAL, 26, 30);    l1.position.set(-6, 3, 2);  scene.add(l1);
const l2 = new THREE.PointLight(ELECTRIC, 26, 30); l2.position.set(6, 3, -8);  scene.add(l2);
const l3 = new THREE.PointLight(BALL_ORANGE, 16, 12); l3.position.copy(RIM);   scene.add(l3);
scene.add(new THREE.AmbientLight(VIOLET, 0.9));

// --- flight path: closed loop, REAL ballistic arc into the rim — seamless --------------
const LAUNCH = new THREE.Vector3(1.4, 2.4, 0.0);
const path = new THREE.CatmullRomCurve3([
  new THREE.Vector3( 2.6, 0.6,  2.6),
  LAUNCH,
  ...bankShotPoints(LAUNCH, RIM, new THREE.Vector3(0, RIM.y + 0.45, -6.48), 58, 6),  // over the net, off the glass, in
  new THREE.Vector3( 0.0, 1.0, -6.4),
  new THREE.Vector3(-1.9, 0.7, -3.2),
  new THREE.Vector3(-2.7, 1.8,  0.6),
  new THREE.Vector3(-0.6, 0.9,  3.0),
], true, 'centripetal');

// --- comet trail: soft round sprites, coral → electric blue fade -----------------------
function glowSprite() {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.35, 'rgba(255,255,255,0.55)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}
const POOL = 420, LIFE = 80;
const tGeo = new THREE.BufferGeometry();
const tPos = new Float32Array(POOL * 3);
const tCol = new Float32Array(POOL * 3);
tGeo.setAttribute('position', new THREE.BufferAttribute(tPos, 3));
tGeo.setAttribute('color', new THREE.BufferAttribute(tCol, 3));
const tMat = new THREE.PointsMaterial({
  size: 0.17, vertexColors: true, transparent: true, map: glowSprite(),
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
});
scene.add(new THREE.Points(tGeo, tMat));
const ages = new Float32Array(POOL).fill(LIFE);
let cursor = 0;
const cA = new THREE.Color(CORAL), cB = new THREE.Color(ELECTRIC), cTmp = new THREE.Color();

// --- animate -----------------------------------------------------------------------------
const clock = new THREE.Clock();
const frameEl = document.getElementById('frame');
const ballPos = new THREE.Vector3();

function resize() {
  const w = frameEl.clientWidth || innerWidth, h = frameEl.clientHeight || innerHeight;
  renderer.setSize(w, h, false);
  composer.setSize(w, h);
  camera.aspect = w / h;
  fitFov(camera, 45, 58);              // 9:16 keeps hoop + flight + trail in frame
  for (const m of lineMats) m.resolution.set(w, h);   // fat lines are resolution-aware
}
addEventListener('frame-resize', resize);
mountViewframe();
resize();

renderer.setAnimationLoop(() => {
  const t = (clock.getElapsedTime() % LOOP_SECONDS) / LOOP_SECONDS;

  path.getPointAt(t, ballPos);
  ball.position.copy(ballPos);
  ball.rotation.x += 0.05;
  ball.rotation.y += 0.02;

  // rim flare on the pass-through — distance-based, robust to path edits
  const nearRim = Math.exp(-Math.pow(ballPos.distanceTo(RIM) / 0.55, 2));
  rim.scale.setScalar(1 + nearRim * 0.12);
  l3.intensity = 16 + nearRim * 50;

  // trail
  for (let s = 0; s < 4; s++) {
    tPos.set([
      ballPos.x + (Math.random() - 0.5) * 0.12,
      ballPos.y + (Math.random() - 0.5) * 0.12,
      ballPos.z + (Math.random() - 0.5) * 0.12,
    ], cursor * 3);
    ages[cursor] = 0;
    cursor = (cursor + 1) % POOL;
  }
  for (let i = 0; i < POOL; i++) {
    if (ages[i] < LIFE) ages[i]++;
    const f = Math.pow(1 - ages[i] / LIFE, 1.6);
    cTmp.copy(cA).lerp(cB, (i % 40) / 40).multiplyScalar(f);
    tCol.set([cTmp.r, cTmp.g, cTmp.b], i * 3);
  }
  tGeo.attributes.position.needsUpdate = true;
  tGeo.attributes.color.needsUpdate = true;

  // camera: one orbit per loop
  const ca = t * TAU;
  camera.position.set(Math.sin(ca) * 9.5, 2.6 + Math.sin(t * TAU) * 0.4, Math.cos(ca) * 9.5 - 1.8);
  camera.lookAt(0, 1.7, -2.2);

  composer.render();
});
</script>
</body>
</html>
