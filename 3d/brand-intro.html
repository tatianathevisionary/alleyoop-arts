<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLEYOOP — Brand Intro (12s ident previz)</title>
<style>
  /* Brand palette only: Ink Black #0E0E0E · Court Cream #F2E9C7 · Alleyoop Orange #EE9933 */
  html, body { margin: 0; height: 100%; background: #0E0E0E; overflow: hidden; color: #F2E9C7; }
  .tag {
    position: fixed; left: 24px; bottom: 20px;
    font: 500 13px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
    color: #F2E9C7; letter-spacing: .12em; user-select: none; z-index: 11;
  }
  .tag b { letter-spacing: .18em; }

  /* ---- overlay stack inside the frame ---- */
  #cover {
    position: absolute; inset: 0; background: #F2E9C7;
    opacity: 0; transition: opacity 1s ease; pointer-events: none;
  }
  #cover.on { opacity: 1; }

  #lockup {
    position: absolute; inset: 0; display: grid; place-content: center;
    text-align: center; pointer-events: none; color: #0E0E0E;
  }
  .word {
    display: flex; align-items: center; justify-content: center;
    font: 800 clamp(40px, 9vw, 96px)/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: .06em; color: #0E0E0E;
  }
  .word .half { opacity: 0; transition: opacity .8s ease, transform .8s ease; }
  .word .left  { transform: translateX(-24px); }
  .word .right { transform: translateX(24px); }
  .word.on .half { opacity: 1; transform: translateX(0); }

  .oo { position: relative; display: inline-flex; align-items: center; margin: 0 .04em; }
  .ring {
    width: .78em; height: .78em; border-radius: 50%;
    border: .085em solid #0E0E0E; box-sizing: border-box;
    transform: scale(0); transition: transform .6s cubic-bezier(.2, 1.4, .4, 1);
  }
  .ring + .ring { margin-left: .07em; }
  .oo.on .ring { transform: scale(1); }
  .oo.on .ring:nth-child(2) { transition-delay: .15s; }

  .arc {
    position: absolute; left: -6%; right: -6%; top: -58%; height: 70%; width: 112%;
    overflow: visible; pointer-events: none;
  }
  .arc path {
    fill: none; stroke: #EE9933; stroke-width: 5; stroke-linecap: round;
    stroke-dasharray: 240; stroke-dashoffset: 240;
  }
  .arc.on path { transition: stroke-dashoffset 1s ease .45s; stroke-dashoffset: 0; }

  .arts {
    font: 400 clamp(18px, 3.4vw, 34px)/1 "Snell Roundhand", "Brush Script MT", cursive;
    margin-top: .4em; opacity: 0; transition: opacity .9s ease .3s;
  }
  .arts.on { opacity: 1; }

  .tagline {
    font: 500 clamp(13px, 1.8vw, 18px)/1 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: .22em; margin-top: 2.2em;
    opacity: 0; transition: opacity 1s ease;
  }
  .tagline.on { opacity: .85; }

  .est {
    font: 500 11px/1 ui-monospace, Menlo, monospace; letter-spacing: .3em;
    margin-top: 1.4em; opacity: 0; transition: opacity 1s ease .3s;
  }
  .est.on { opacity: .45; }

  #replay {
    position: fixed; right: 16px; bottom: 16px; z-index: 12;
    font: 600 11px/1 ui-monospace, Menlo, monospace; letter-spacing: .08em;
    padding: 7px 12px; cursor: pointer;
    background: transparent; color: #F2E9C7;
    border: 1.5px solid #F2E9C7; border-radius: 2px; opacity: .55;
  }
  #replay:hover { opacity: 1; }
</style>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>
<div id="frame">
  <canvas id="scene"></canvas>
  <div id="cover"></div>
  <div id="lockup">
    <div class="word" id="word">
      <span class="half left">ALLEY</span><span class="oo" id="oo">
        <svg class="arc" id="arc" viewBox="0 0 200 80" preserveAspectRatio="none">
          <path d="M 8 76 Q 100 -30 192 76"/>
        </svg>
        <span class="ring"></span><span class="ring"></span>
      </span><span class="half right">P</span>
    </div>
    <div class="arts" id="arts">arts</div>
    <div class="tagline" id="tagline">THE PASS IS THE PLAY.</div>
    <div class="est" id="est">EST. 2026 · CANADA</div>
  </div>
</div>
<button id="replay">↺ REPLAY</button>
<div class="tag"><b>ALLEYOOP</b> · brand intro · 12s ident · previz</div>

<script type="module">
import * as THREE from 'three';
import { mountViewframe, fitFov } from './viewframe.js';
import { makeBasketball, makeNet } from './basketball.js';

const CREAM = 0xF2E9C7, INK = 0x0E0E0E, ORANGE = 0xEE9933;
const BALL_R = 0.34;
const DURATION = 12, RESTART_AT = 15;   // 3s hold, then auto-replay (preview convenience)

// ---- timeline (seconds) ----
const TL = {
  drop:    [0.0, 1.7],    // ball drops in, two decaying bounces
  lob:     [2.0, 4.6],    // the lob — arc across frame, orange trail
  rims:    [3.4, 4.2],    // rims fade in mid-lob
  through: [4.6, 5.5],    // ball drops through the right rim; rim pulses
  cover:   5.8,           // cut to cream
  word:    6.3,           // ALLEY · P slide in
  oo:      6.6,           // the rims-as-letters scale in
  arc:     6.9,           // orange lob arc draws over the OO
  arts:    7.6,
  tagline: 9.0,
  est:     9.6,
};

// ---- three.js scene ----
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(CREAM);

const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 50);
camera.position.set(0, 1.7, 8.4);
camera.lookAt(0, 1.5, 0);

const key = new THREE.DirectionalLight(0xffffff, 2.6);
key.position.set(3, 7, 4);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = key.shadow.camera.bottom = -6;
key.shadow.camera.right = key.shadow.camera.top = 6;
key.shadow.radius = 8;
scene.add(key);
scene.add(new THREE.HemisphereLight(CREAM, 0xCBBF9A, 1.1));

const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.ShadowMaterial({ opacity: 0.16 }));
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// ONE rim — horizontal, with a net. (The lockup's OO lives in the type layer.)
const RIM_Y = 1.6, RIM_DX = 0.9;
const rimMats = [];
const rims = [RIM_DX].map(x => {
  const mat = new THREE.MeshStandardMaterial({ color: INK, roughness: 0.85, transparent: true, opacity: 0 });
  rimMats.push(mat);
  const rim = new THREE.Mesh(new THREE.TorusGeometry(0.52, 0.05, 24, 96), mat);
  rim.rotation.x = Math.PI / 2;
  rim.position.set(x, RIM_Y, 0);
  rim.castShadow = true;
  scene.add(rim);
  return rim;
});
const net = makeNet(0.5, { color: 0x9A937B, depth: 0.55 });
net.position.set(RIM_DX, RIM_Y, 0);
scene.add(net);
const netMat = net.children[0].material;   // shared by all strands
netMat.transparent = true;
netMat.opacity = 0;
// the board — fades in with the rim
const boardMat = new THREE.MeshStandardMaterial({ color: 0xFAF3D7, roughness: 0.85, transparent: true, opacity: 0 });
const board = new THREE.Mesh(new THREE.BoxGeometry(0.07, 1.0, 1.45), boardMat);
board.position.set(RIM_DX + 0.58, RIM_Y + 0.4, 0);
scene.add(board);
rimMats.push(boardMat);   // rides the same fade

// the ball — a basketball, the only orange object in the 3D beat
const ball = makeBasketball(BALL_R, { castShadow: true, seamWidth: 0.06 });
scene.add(ball);

// the trail — a thin orange line history of the lob
const TRAIL_MAX = 90;
const trailGeo = new THREE.BufferGeometry();
const trailPos = new Float32Array(TRAIL_MAX * 3);
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
trailGeo.setDrawRange(0, 0);
const trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({ color: ORANGE, transparent: true, opacity: 0.55 }));
scene.add(trail);
let trailCount = 0;

// swish burst — orange shards thrown from the rim at the pass-through, one shot
const BURST_N = 70, BURST = [5.15, 6.35];
const burstGeo = new THREE.BufferGeometry();
const burstPos = new Float32Array(BURST_N * 3);
burstGeo.setAttribute('position', new THREE.BufferAttribute(burstPos, 3));
const burstVel = [];
for (let i = 0; i < BURST_N; i++) {
  const a = Math.random() * Math.PI * 2;
  const up = 0.4 + Math.random() * 1.4;
  const out = 0.5 + Math.random() * 1.3;
  burstVel.push([Math.cos(a) * out, up, Math.sin(a) * out * 0.4]);
}
const burstMat = new THREE.PointsMaterial({ color: ORANGE, size: 0.075, transparent: true, opacity: 0 });
const burst = new THREE.Points(burstGeo, burstMat);
scene.add(burst);

// ---- motion helpers ----
const clamp01 = v => Math.min(1, Math.max(0, v));
const seg = (t, [a, b]) => clamp01((t - a) / (b - a));
const easeIn = p => p * p;
const easeInOut = p => p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
const hump = p => 4 * p * (1 - p);   // 0→1→0 parabola

const DROP_X = -3.1;
function dropY(p) {  // fall + two decaying bounces, rests at BALL_R
  if (p < 0.40) { const q = p / 0.40; return 5.2 - (5.2 - BALL_R) * q * q; }
  if (p < 0.72) { const q = (p - 0.40) / 0.32; return BALL_R + 1.45 * hump(q); }
  if (p < 0.92) { const q = (p - 0.72) / 0.20; return BALL_R + 0.42 * hump(q); }
  return BALL_R;
}

// lob: quadratic bezier, ground-left → apex → hover above the right rim
const P0 = new THREE.Vector2(DROP_X, BALL_R);
const P1 = new THREE.Vector2(-0.7, 5.0);
const P2 = new THREE.Vector2(RIM_DX, 2.75);
function lobPoint(p, out) {
  const u = 1 - p;
  out.x = u * u * P0.x + 2 * u * p * P1.x + p * p * P2.x;
  out.y = u * u * P0.y + 2 * u * p * P1.y + p * p * P2.y;
}
const tmp = new THREE.Vector2();

// ---- DOM beats ----
const els = {
  cover:   document.getElementById('cover'),
  word:    document.getElementById('word'),
  oo:      document.getElementById('oo'),
  arc:     document.getElementById('arc'),
  arts:    document.getElementById('arts'),
  tagline: document.getElementById('tagline'),
  est:     document.getElementById('est'),
};
const domBeats = [
  [TL.cover,   () => els.cover.classList.add('on')],
  [TL.word,    () => els.word.classList.add('on')],
  [TL.oo,      () => els.oo.classList.add('on')],
  [TL.arc,     () => els.arc.classList.add('on')],
  [TL.arts,    () => els.arts.classList.add('on')],
  [TL.tagline, () => els.tagline.classList.add('on')],
  [TL.est,     () => els.est.classList.add('on')],
];
let fired = new Set();

function reset() {
  fired = new Set();
  trailCount = 0;
  trailGeo.setDrawRange(0, 0);
  for (const el of Object.values(els)) el.classList.remove('on');
  rimMats.forEach(m => m.opacity = 0);
  netMat.opacity = 0;
  startTime = performance.now() / 1000;
}
document.getElementById('replay').onclick = reset;

// ---- main loop ----
let startTime = performance.now() / 1000;
const frameEl = document.getElementById('frame');

function resize() {
  const w = frameEl.clientWidth || innerWidth, h = frameEl.clientHeight || innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  fitFov(camera, 38, 47);   // 9:16 keeps the full lob arc + both rims in frame
}
addEventListener('frame-resize', resize);
mountViewframe();
resize();

renderer.setAnimationLoop(() => {
  const t = performance.now() / 1000 - startTime;
  if (t > RESTART_AT) reset();

  // DOM beats fire once each
  for (const [at, fn] of domBeats) {
    if (t >= at && !fired.has(at)) { fired.add(at); fn(); }
  }

  // beat 1 — the drop
  if (t <= TL.drop[1]) {
    ball.position.set(DROP_X, dropY(seg(t, TL.drop)), 0);
  }

  // beat 2 — the lob + trail
  if (t > TL.lob[0] && t <= TL.lob[1]) {
    lobPoint(easeInOut(seg(t, TL.lob)), tmp);
    ball.position.set(tmp.x, tmp.y, 0);
    if (trailCount < TRAIL_MAX) {
      trailPos.set([tmp.x, tmp.y, 0], trailCount * 3);
      trailCount++;
      trailGeo.setDrawRange(0, trailCount);
      trailGeo.attributes.position.needsUpdate = true;
    }
  }

  // rim + net fade in mid-lob
  const rimFade = seg(t, TL.rims);
  if (rimFade > 0 && rimFade < 1.001) {
    rimMats.forEach(m => m.opacity = rimFade);
    netMat.opacity = rimFade;
  }

  // beat 3 — through the rim, swish pulse
  if (t > TL.through[0] && t <= TL.through[1] + 0.6) {
    const p = clamp01(seg(t, TL.through));
    ball.position.set(RIM_DX, 2.75 - easeIn(p) * 2.6, 0);
    const pulse = 1 + 0.09 * hump(clamp01((p - 0.45) / 0.45));
    rims[0].scale.set(pulse, pulse, pulse);
  }

  // swish burst — fully deterministic from phase, so replay is identical
  if (t > BURST[0] && t <= BURST[1]) {
    const p = seg(t, BURST);
    for (let i = 0; i < BURST_N; i++) {
      const [vx, vy, vz] = burstVel[i];
      burstPos.set([
        RIM_DX + vx * p * 1.6,
        RIM_Y + vy * p * 1.6 - 2.6 * p * p,
        vz * p * 1.6,
      ], i * 3);
    }
    burstGeo.attributes.position.needsUpdate = true;
    burstMat.opacity = (1 - p) * 0.9;
  } else {
    burstMat.opacity = 0;
  }

  // ball spin throughout
  ball.rotation.z -= 0.04;

  renderer.render(scene, camera);
});
</script>
</body>
</html>
