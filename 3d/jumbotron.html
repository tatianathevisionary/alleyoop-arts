<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLEYOOP — Jumbotron (voxel ball)</title>
<style>
  html, body { margin: 0; height: 100%; background: #0B0B14; overflow: hidden; color: #F2E9C7; }
  .tag { position: fixed; left: 24px; bottom: 20px; font: 500 13px/1.4 ui-monospace, Menlo, monospace;
         color: #F2E9C7; letter-spacing: .12em; user-select: none; }
  .tag b { letter-spacing: .18em; }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="frame"><canvas id="scene"></canvas></div>
<div class="tag"><b>ALLEYOOP</b> · jumbotron · 8s loop · the ball, in lights</div>
<script type="module">
import * as THREE from 'three';
import { mountViewframe, fitFov } from './viewframe.js';
import { BALL_ORANGE, SEAM_CHARCOAL } from './basketball.js';

const DEEP = 0x0B0B14, CORAL = 0xE2726D;
const LOOP_SECONDS = 8, TAU = Math.PI * 2;
const R = 2.4, VOX = 0.16;

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(DEEP);
const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 60);
camera.position.set(0, 1.2, 9.5);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0x404060, 0.9));
const key = new THREE.DirectionalLight(0xffffff, 1.6);
key.position.set(5, 6, 6);
scene.add(key);

// the ball rebuilt as stadium lights: voxels on a sphere shell,
// orange pixels for leather, charcoal pixels where the seams run
const group = new THREE.Group();
scene.add(group);

const seamTest = (p) => {                       // the 5-line seam layout, as a test
  const ay = Math.abs(p.y);
  if (ay < 0.07 * R) return true;               // equator
  if (Math.abs(p.z) < 0.07 * R) return true;    // meridian
  const d = 0.56 * R;
  if (Math.abs(Math.abs(p.z) - d) < 0.06 * R && Math.abs(p.y) < Math.sqrt(R * R - d * d)) return true;
  return false;
};

const voxGeo = new THREE.BoxGeometry(VOX, VOX, VOX);
const orangeMat = new THREE.MeshStandardMaterial({
  color: BALL_ORANGE, emissive: BALL_ORANGE, emissiveIntensity: 0.55, roughness: 0.5,
});
const inkMat = new THREE.MeshStandardMaterial({
  color: SEAM_CHARCOAL, emissive: SEAM_CHARCOAL, emissiveIntensity: 0.2, roughness: 0.7,
});

// fibonacci sphere → even pixel coverage
const COUNT = 1400;
const voxels = [];
const GA = Math.PI * (3 - Math.sqrt(5));
for (let i = 0; i < COUNT; i++) {
  const y = 1 - (i / (COUNT - 1)) * 2;
  const rad = Math.sqrt(1 - y * y);
  const th = GA * i;
  const p = new THREE.Vector3(Math.cos(th) * rad * R, y * R, Math.sin(th) * rad * R);
  const m = new THREE.Mesh(voxGeo, seamTest(p) ? inkMat : orangeMat);
  m.position.copy(p);
  m.lookAt(0, 0, 0);
  group.add(m);
  voxels.push({ m, p });
}

const clock = new THREE.Clock();
const frameEl = document.getElementById('frame');
function resize() {
  const w = frameEl.clientWidth || innerWidth, h = frameEl.clientHeight || innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  fitFov(camera, 38, 46);
}
addEventListener('frame-resize', resize);
mountViewframe();
resize();

renderer.setAnimationLoop(() => {
  const t = (clock.getElapsedTime() % LOOP_SECONDS) / LOOP_SECONDS;

  group.rotation.y = t * TAU;                            // one turn per loop

  // a pulse wave sweeps the sphere twice per loop — pixels breathe outward
  for (const { m, p } of voxels) {
    const wave = Math.sin(t * TAU * 2 - p.y * 1.2);
    const out = 1 + Math.max(0, wave) * 0.09;
    m.position.copy(p).multiplyScalar(out);
    const s = 1 + Math.max(0, wave) * 0.5;
    m.scale.setScalar(s);
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
