<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLEYOOP — The Shot (loop prototype)</title>
<style>
  /* Brand layer: Ink Black · Court Cream · Alleyoop Orange. One hoop. One make. */
  html, body { margin: 0; height: 100%; background: #0E0E0E; overflow: hidden; color: #F2E9C7; }
  .tag {
    position: fixed; left: 24px; bottom: 20px;
    font: 500 13px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
    color: #F2E9C7; letter-spacing: .12em; user-select: none;
  }
  .tag b { letter-spacing: .18em; }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="frame"><canvas id="scene"></canvas></div>
<div class="tag"><b>ALLEYOOP</b> · the shot · 6s loop · dribble, dribble, make</div>

<script type="module">
import * as THREE from 'three';
import { mountViewframe, fitFov } from './viewframe.js';
import { makeBasketball, makeNet, bankShotPoints, dribbleY } from './basketball.js';

const CREAM = 0xF2E9C7, INK = 0x0E0E0E;
const LOOP_SECONDS = 6;
const BALL_R = 0.34;

// --- renderer / scene / camera ----------------------------------------------
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('scene'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(CREAM);

const camera = new THREE.PerspectiveCamera(36, 1, 0.1, 50);
camera.position.set(0, 1.7, 8.2);
camera.lookAt(0, 1.5, 0);

const key = new THREE.DirectionalLight(0xffffff, 2.6);
key.position.set(3, 6, 4);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = key.shadow.camera.bottom = -5;
key.shadow.camera.right = key.shadow.camera.top = 5;
key.shadow.radius = 8;
scene.add(key);
scene.add(new THREE.HemisphereLight(CREAM, 0xCBBF9A, 1.1));

const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.ShadowMaterial({ opacity: 0.16 }));
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
floor.receiveShadow = true;
scene.add(floor);

// --- ONE hoop: ink rim (the brand O), cream net, thin pole --------------------
const HOOP = new THREE.Vector3(1.9, 2.3, 0);
const inkMat = new THREE.MeshStandardMaterial({ color: INK, roughness: 0.8 });
const rim = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 20, 80), inkMat);
rim.rotation.x = Math.PI / 2;
rim.position.copy(HOOP);
rim.castShadow = true;
scene.add(rim);
const net = makeNet(0.48, { color: 0x9A937B, depth: 0.55 });   // cream-shadow tone, reads on cream
net.position.copy(HOOP);
scene.add(net);
const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, HOOP.y + 0.9, 10), inkMat);
pole.position.set(HOOP.x + 0.62, (HOOP.y + 0.9) / 2, 0);
pole.castShadow = true;
scene.add(pole);
// the board — cream face, ink target square, mounted behind the rim
const board = new THREE.Mesh(
  new THREE.BoxGeometry(0.07, 1.05, 1.5),
  new THREE.MeshStandardMaterial({ color: 0xFAF3D7, roughness: 0.85 })
);
board.position.set(HOOP.x + 0.58, HOOP.y + 0.42, 0);
board.castShadow = true;
scene.add(board);
const target = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.42, 0.58), inkMat);
target.position.set(HOOP.x + 0.54, HOOP.y + 0.26, 0);
scene.add(target);

// --- the ball -------------------------------------------------------------------
const ball = makeBasketball(BALL_R, { castShadow: true, seamWidth: 0.06 });
scene.add(ball);

// --- motion: two dribbles in → the shot → through the net → roll home -------------
const START = new THREE.Vector3(-3.0, BALL_R, 0);
const LAUNCH = new THREE.Vector3(-0.4, BALL_R, 0);
const GLASS = new THREE.Vector3(HOOP.x + 0.5, HOOP.y + 0.42, 0);   // the kiss point
const ARC = [LAUNCH.clone(), ...bankShotPoints(LAUNCH, HOOP, GLASS, 62, 9)];
const SEG = { dribble: 0.42, shot: 0.62, drop: 0.72, home: 1.0 };

const xz = new THREE.Vector2();
function ballAt(t, out) {
  if (t < SEG.dribble) {                    // two dribbles toward the launch spot
    const p = t / SEG.dribble;
    out.lerpVectors(START, LAUNCH, p);
    out.y = dribbleY(p, 2, 1.15, BALL_R);
  } else if (t < SEG.shot) {                // the shot — true arc, lands on the rim
    const p = (t - SEG.dribble) / (SEG.shot - SEG.dribble);
    const f = p * (ARC.length - 1);
    const i = Math.min(ARC.length - 2, Math.floor(f));
    out.copy(ARC[i]).lerp(ARC[i + 1], f - i);
  } else if (t < SEG.drop) {                // swish — straight down through the net
    const p = (t - SEG.shot) / (SEG.drop - SEG.shot);
    out.set(HOOP.x, HOOP.y - (HOOP.y - BALL_R) * p * p, 0);
  } else {                                  // one big bounce + roll back to the start
    const p = (t - SEG.drop) / (SEG.home - SEG.drop);
    out.lerpVectors(new THREE.Vector3(HOOP.x, BALL_R, 0), START, p);
    out.y = dribbleY(p, 2, 0.9 * (1 - p * 0.5), BALL_R);
  }
}

// --- animate -----------------------------------------------------------------------
const clock = new THREE.Clock();
const frameEl = document.getElementById('frame');
const pos = new THREE.Vector3(), prev = new THREE.Vector3();

function resize() {
  const w = frameEl.clientWidth || innerWidth, h = frameEl.clientHeight || innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  fitFov(camera, 36, 42);   // 9:16 keeps the full arc + hoop in frame
}
addEventListener('frame-resize', resize);
mountViewframe();
resize();

renderer.setAnimationLoop(() => {
  const t = (clock.getElapsedTime() % LOOP_SECONDS) / LOOP_SECONDS;

  prev.copy(pos);
  ballAt(t, pos);
  ball.position.copy(pos);

  // roll + contact squash
  const v = pos.distanceTo(prev);
  ball.rotation.z -= (pos.x - prev.x) / BALL_R * 0.9;
  const squash = 1 - 0.2 * Math.exp(-Math.pow((pos.y - BALL_R) / 0.1, 2));
  ball.scale.set(2 - squash, squash, 2 - squash).multiplyScalar(0.5 + 0.5 * squash);

  // rim pulse on the make
  const nearRim = Math.exp(-Math.pow(pos.distanceTo(HOOP) / 0.45, 2));
  rim.scale.setScalar(1 + nearRim * 0.08);

  renderer.render(scene, camera);
});
</script>
</body>
</html>
