# Deploy the public site to GitHub Pages.
# Publishes a _site/ build that EXCLUDES heavy, non-public directories so the
# published site stays under the 1 GB Pages limit. Excluded dirs remain in the
# repo (git), they're just not served:
#   collections/  — 156-image archive (~446 MB)
#   3d/renders/   — exported render videos (~397 MB)
#   outputs/      — raw generation batches (~142 MB)
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build public site (exclude heavy dirs)
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'collections' \
            --exclude '3d/renders' \
            --exclude 'outputs' \
            --exclude 'scripts' \
            --exclude '.claude' \
            --exclude 'node_modules'
          echo "Published site size:" && du -sh _site
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
