<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alleyoop Shop — Limited Edition Basketball Art Prints</title>
<meta name="description" content="Limited-edition basketball art prints, signed and numbered. Editions of 25–60. Get posterized." />
<link rel="icon" href="logo/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Sacramento&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css" />
<style>
  /* shop-specific styles on top of site.css */
  .ghero{ padding:clamp(48px,8vw,96px) 0 clamp(28px,4vw,44px); border-bottom:1px solid var(--hair); }
  .ghero h1{ font-weight:800; letter-spacing:-.03em; line-height:.95; font-size:clamp(48px,10vw,128px); margin:14px 0 0; }
  .chips{ display:flex; flex-wrap:wrap; gap:9px; padding:24px 0; position:sticky; top:61px; z-index:30;
    background:color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter:blur(8px); }
  .chip{ appearance:none; cursor:pointer; font:inherit; font-size:12.5px; font-weight:600; letter-spacing:.01em;
    padding:9px 17px; border-radius:999px; border:1px solid var(--hair); background:transparent; color:var(--fg-dim); transition:all .18s; }
  .chip:hover{ color:var(--fg); border-color:var(--fg-faint); }
  .chip[data-on="1"]{ background:var(--fg); color:var(--bg); border-color:transparent; }

  .pgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:clamp(14px,2vw,26px); padding:8px 0 80px; }
  @media (max-width:1100px){ .pgrid{ grid-template-columns:repeat(3,1fr); } }
  @media (max-width:760px){ .pgrid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:480px){ .pgrid{ grid-template-columns:1fr; } }
  .pcard .frameimg{ position:relative; overflow:hidden; background:var(--surface); border-radius:3px; aspect-ratio:2/3; }
  .pcard img{ display:block; width:100%; height:100%; object-fit:cover; transition:transform .5s cubic-bezier(.2,.7,.2,1); }
  .pcard:hover img{ transform:scale(1.035); }
  .pcard .ov{ position:absolute; inset:0; display:flex; align-items:flex-end; padding:16px;
    background:linear-gradient(180deg,transparent 55%, rgba(14,14,14,.7)); opacity:0; transition:opacity .3s; }
  .pcard:hover .ov{ opacity:1; }
  .pcard .ov span{ font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:#F2E9C7;
    border:1px solid rgba(242,233,199,.6); border-radius:999px; padding:7px 13px; }
  .pcap{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:12px 2px 0; }
  .pcap .t{ font-weight:700; font-size:15.5px; letter-spacing:-.01em; }
  .pcap .s{ font-size:12px; color:var(--fg-dim); margin-top:3px; }
  .pcap .p{ font-weight:700; font-size:14px; white-space:nowrap; }
  .addmini{ appearance:none; cursor:pointer; font:inherit; font-size:11.5px; font-weight:700; letter-spacing:.06em;
    margin-top:6px; padding:6px 12px; border-radius:999px; border:1px solid var(--hair); background:transparent; color:var(--fg); transition:all .15s; }
  .addmini:hover{ background:var(--orange); border-color:var(--orange); color:#0E0E0E; }

  .cartbtn{ appearance:none; cursor:pointer; font:inherit; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    display:inline-flex; align-items:center; gap:8px; padding:9px 16px; border-radius:999px; border:1px solid var(--hair);
    background:transparent; color:var(--fg); }
  .cartbtn:hover{ border-color:var(--fg-faint); }
  .cartn{ display:inline-grid; place-items:center; min-width:20px; height:20px; padding:0 5px; border-radius:999px;
    background:var(--orange); color:#0E0E0E; font-size:11px; font-weight:800; }

  /* product detail lightbox */
  .lb{ position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    background:rgba(8,8,8,.92); backdrop-filter:blur(6px); padding:clamp(14px,3vw,44px); }
  .lb-inner{ display:grid; grid-template-columns:minmax(0,1.4fr) minmax(300px,.9fr); gap:clamp(20px,4vw,56px);
    max-width:1180px; width:100%; max-height:92vh; align-items:center; }
  @media (max-width:820px){ .lb-inner{ grid-template-columns:1fr; max-height:none; overflow:auto; } }
  .lb-img{ display:flex; align-items:center; justify-content:center; }
  .lb-img img{ max-width:100%; max-height:84vh; width:auto; height:auto; border-radius:3px; box-shadow:0 40px 90px rgba(0,0,0,.5); }
  @media (max-width:820px){ .lb-img img{ max-height:50vh; } }
  .lb-meta{ color:#F2E9C7; }
  .lb-field{ display:flex; justify-content:space-between; gap:18px; padding:9px 0; border-bottom:1px solid rgba(242,233,199,.14); font-size:13.5px; }
  .lb-field span:first-child{ color:rgba(242,233,199,.55); }
  .lb-field span:last-child{ font-weight:600; text-align:right; }
  .lb-close{ position:fixed; top:18px; right:20px; z-index:101; appearance:none; cursor:pointer;
    width:42px; height:42px; border-radius:50%; border:1px solid rgba(242,233,199,.3); background:rgba(0,0,0,.3); color:#F2E9C7; font-size:18px; }
  .acquire{ display:inline-flex; align-items:center; gap:10px; cursor:pointer; background:var(--orange); color:#0E0E0E;
    font-weight:700; font-size:13.5px; letter-spacing:.02em; padding:14px 24px; border-radius:999px; border:0; }
  .acquire[disabled]{ opacity:.4; cursor:not-allowed; }

  /* cart drawer */
  .cart-scrim{ position:fixed; inset:0; z-index:110; background:rgba(8,8,8,.5); backdrop-filter:blur(3px); }
  .cart{ position:fixed; top:0; right:0; bottom:0; width:min(430px,94vw); background:var(--bg); color:var(--fg);
    border-left:1px solid var(--hair); padding:22px 24px; display:flex; flex-direction:column; overflow:auto; }
  .cart-head{ display:flex; justify-content:space-between; align-items:center; padding-bottom:14px; border-bottom:1px solid var(--hair); }
  .cart-head .lb-close{ border-color:var(--hair); background:transparent; color:var(--fg); }
  .cart-lines{ flex:1; display:flex; flex-direction:column; gap:16px; padding:18px 0; }
  .cart-line{ display:flex; gap:14px; align-items:flex-start; }
  .cart-line img{ width:58px; height:87px; object-fit:cover; border-radius:3px; }
  .rmv{ appearance:none; cursor:pointer; font:inherit; font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    background:transparent; border:0; color:var(--fg-faint); padding:2px; }
  .rmv:hover{ color:var(--orange); }
  .cart-foot{ border-top:1px solid var(--hair); padding-top:16px; margin-top:auto; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="logo.jsx?v=1"></script>
<script type="text/babel" src="shop.jsx?v=1"></script>
</body>
</html>
