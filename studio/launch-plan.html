<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alleyoop Arts — The First 100 Days</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='47' fill='%23EE9933'/%3E%3Cg stroke='%230E0E0E' stroke-width='4' fill='none' stroke-linecap='round'%3E%3Cline x1='50' y1='3' x2='50' y2='97'/%3E%3Cline x1='3' y1='50' x2='97' y2='50'/%3E%3Cpath d='M50 3 C22 26 22 74 50 97'/%3E%3Cpath d='M50 3 C78 26 78 74 50 97'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Sacramento&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#0E0E0E; --cream:#F2E9C7; --orange:#EE9933; --teal:#223333;
    --grotesque:'Hanken Grotesk', system-ui, sans-serif; --script:'Sacramento', cursive; }
  *{ box-sizing:border-box; }
  body{ margin:0; }
  .doc{ font-family:var(--grotesque); background:var(--bg); color:var(--fg); min-height:100vh;
    transition:background .35s ease, color .35s ease; overflow-x:hidden; }
  [data-mode="cream"]{ --bg:var(--cream); --fg:var(--ink);
    --fg-dim:color-mix(in srgb, var(--ink) 58%, var(--cream));
    --fg-faint:color-mix(in srgb, var(--ink) 36%, var(--cream));
    --hair:color-mix(in srgb, var(--ink) 16%, transparent);
    --surface:color-mix(in srgb, var(--cream) 88%, var(--ink)); --rim:var(--ink); }
  [data-mode="ink"]{ --bg:var(--ink); --fg:var(--cream);
    --fg-dim:color-mix(in srgb, var(--cream) 62%, var(--ink));
    --fg-faint:color-mix(in srgb, var(--cream) 38%, var(--ink));
    --hair:color-mix(in srgb, var(--cream) 18%, transparent);
    --surface:color-mix(in srgb, var(--ink) 88%, var(--cream)); --rim:var(--cream); }
  .wrap{ max-width:1240px; margin:0 auto; padding:0 clamp(20px,4vw,52px); }
  .section{ padding:clamp(52px,8vw,96px) 0; border-top:1px solid var(--hair); }
  .mono-label{ font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--fg-faint); }
  .eyebrow{ font-size:12px; font-weight:600; letter-spacing:.26em; text-transform:uppercase; color:var(--fg-dim); display:flex; align-items:center; gap:14px; }
  .eyebrow .num{ color:var(--orange); }
  .h2{ font-weight:800; letter-spacing:-.025em; line-height:1.03; font-size:clamp(30px,4.6vw,56px); margin:16px 0 0; text-wrap:balance; }
  .lead{ font-size:clamp(16px,1.5vw,20px); line-height:1.6; color:var(--fg-dim); max-width:64ch; }

  .wm{ display:inline-flex; align-items:center; font-weight:800; letter-spacing:-.045em; line-height:1; white-space:nowrap; color:var(--fg); }
  .wm .ch{ display:inline-block; }
  .wm .oo{ position:relative; display:inline-flex; align-items:center; gap:.012em; margin:0 .006em; }
  .wm .rim{ position:relative; display:inline-block; width:.78em; height:.78em; border-radius:50%; border:.118em solid var(--rim); box-sizing:border-box; top:.012em; }
  .wm.twopart .rim.finish{ border-color:var(--orange); }
  .wm.oo-overlap .oo{ gap:0; }
  .wm.oo-overlap .rim.finish{ margin-left:-.32em; z-index:1; }
  .wm.oo-overlap .rim.pass{ z-index:3; }
  .wm.oo-overlap .oo-ball{ z-index:3; }
  .wm .arc{ position:absolute; left:-6%; top:-44%; width:112%; height:62%; overflow:visible; pointer-events:none; }
  .wm .arc path{ fill:none; stroke:var(--orange); }
  .wm .arc circle{ fill:var(--orange); }

  .ghead{ position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between;
    padding:16px clamp(20px,4vw,52px); background:color-mix(in srgb, var(--bg) 84%, transparent);
    backdrop-filter:blur(14px) saturate(150%); -webkit-backdrop-filter:blur(14px) saturate(150%); border-bottom:1px solid var(--hair); }
  .ghead nav{ display:flex; gap:24px; }
  .ghead nav a{ font-size:12.5px; font-weight:600; letter-spacing:.04em; color:var(--fg-dim); text-decoration:none; }
  .ghead nav a:hover{ color:var(--fg); }
  @media (max-width:900px){ .ghead nav{ display:none; } }
  .modeswitch{ display:inline-flex; padding:3px; border:1px solid var(--hair); border-radius:999px; }
  .modeswitch button{ appearance:none; border:0; background:transparent; cursor:pointer; font:inherit; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--fg-faint); padding:7px 13px; border-radius:999px; transition:all .2s; }
  .modeswitch button[data-on="1"]{ background:var(--fg); color:var(--bg); }

  .grid5{ display:grid; grid-template-columns:repeat(5,1fr); gap:16px; }
  .grid3{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .posters{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; }
  .igs{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media (max-width:1000px){ .grid5{ grid-template-columns:repeat(3,1fr); } .posters{ grid-template-columns:repeat(3,1fr); } }
  @media (max-width:760px){ .grid5,.grid3,.grid2,.posters,.igs{ grid-template-columns:1fr 1fr; } }
  @media (max-width:480px){ .grid5,.grid3,.grid2,.posters,.igs{ grid-template-columns:1fr; } }

  .card{ border:1px solid var(--hair); border-radius:6px; padding:24px; }
  .rise{ opacity:0; transform:translateY(18px); }
  .rise.in{ opacity:1; transform:none; transition:opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1); }
  @media (prefers-reduced-motion:reduce){ .rise{ opacity:1; transform:none; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../logo.jsx?v=11"></script>
<script type="text/babel" src="launch.jsx?v=11"></script>
</body>
</html>
